name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---------------------------------------------------------------------------
  # Extract version from workspace Cargo.toml
  # ---------------------------------------------------------------------------
  version:
    name: Read version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from Cargo.toml
        id: version
        run: |
          VERSION=$(grep -m1 '^version' Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

  # ---------------------------------------------------------------------------
  # Run tests as a sanity check before building anything
  # ---------------------------------------------------------------------------
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --workspace

  # ---------------------------------------------------------------------------
  # Build matrix — 8 targets across 3 OS runners
  # ---------------------------------------------------------------------------
  build:
    name: Build ${{ matrix.target }}
    needs: [version, test]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux — use cross for cross-compilation
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            use_cross: true
            archive_ext: tar.gz
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            use_cross: true
            archive_ext: tar.gz
          - target: i686-unknown-linux-gnu
            runner: ubuntu-latest
            use_cross: true
            archive_ext: tar.gz

          # macOS — ARM runner, cross-compile x86_64
          - target: x86_64-apple-darwin
            runner: macos-latest
            use_cross: false
            archive_ext: tar.gz
          - target: aarch64-apple-darwin
            runner: macos-latest
            use_cross: false
            archive_ext: tar.gz

          # Windows
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            use_cross: false
            archive_ext: zip
          - target: i686-pc-windows-msvc
            runner: windows-latest
            use_cross: false
            archive_ext: zip
          - target: aarch64-pc-windows-msvc
            runner: windows-latest
            use_cross: false
            archive_ext: zip

    env:
      VERSION: ${{ needs.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      # ---- Build all 4 binaries ----

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (cargo)
        if: "!matrix.use_cross"
        run: cargo build --release --target ${{ matrix.target }}

      # ---- Package all 4 binaries into one archive per target ----

      - name: Package archive (Linux/macOS)
        if: matrix.archive_ext == 'tar.gz'
        shell: bash
        run: |
          VERSION="${{ env.VERSION }}"
          TARGET="${{ matrix.target }}"
          BIN_DIR="target/${TARGET}/release"
          ARCHIVE_NAME="salata-${VERSION}-${TARGET}.tar.gz"
          STAGING="staging"

          mkdir -p "${STAGING}"
          for BINARY in salata salata-cgi salata-fastcgi salata-server; do
            cp "${BIN_DIR}/${BINARY}" "${STAGING}/"
          done
          cp config.toml "${STAGING}/config.toml"
          cp README.md "${STAGING}/README.md"

          tar czf "${ARCHIVE_NAME}" -C "${STAGING}" .
          rm -rf "${STAGING}"
          echo "Created ${ARCHIVE_NAME}"

      - name: Package archive (Windows)
        if: matrix.archive_ext == 'zip'
        shell: pwsh
        run: |
          $Version = "${{ env.VERSION }}"
          $Target = "${{ matrix.target }}"
          $BinDir = "target\${Target}\release"
          $ArchiveName = "salata-${Version}-${Target}.zip"
          $Staging = "staging"

          New-Item -ItemType Directory -Path $Staging -Force | Out-Null
          foreach ($Binary in @("salata", "salata-cgi", "salata-fastcgi", "salata-server")) {
            Copy-Item "${BinDir}\${Binary}.exe" "${Staging}\"
          }
          Copy-Item "config.toml" "${Staging}\config.toml"
          Copy-Item "README.md" "${Staging}\README.md"

          Compress-Archive -Path "${Staging}\*" -DestinationPath $ArchiveName
          Remove-Item -Recurse -Force $Staging
          Write-Host "Created ${ArchiveName}"

      # ---- Generate per-target checksum ----

      - name: Generate checksum (Linux/macOS)
        if: matrix.archive_ext == 'tar.gz'
        shell: bash
        run: |
          sha256sum salata-${{ env.VERSION }}-${{ matrix.target }}.tar.gz > checksums-${{ matrix.target }}.txt

      - name: Generate checksum (Windows)
        if: matrix.archive_ext == 'zip'
        shell: pwsh
        run: |
          $Target = "${{ matrix.target }}"
          $File = "salata-${{ env.VERSION }}-${Target}.zip"
          $Hash = (Get-FileHash $File -Algorithm SHA256).Hash.ToLower()
          "$Hash  $File" | Set-Content "checksums-${Target}.txt"

      # ---- Upload build artifacts ----

      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: archive-${{ matrix.target }}
          path: |
            salata-${{ env.VERSION }}-${{ matrix.target }}.${{ matrix.archive_ext }}
            checksums-${{ matrix.target }}.txt
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Create GitHub Release with 8 archives + checksums
  # ---------------------------------------------------------------------------
  release:
    name: Create release
    needs: [version, build]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: archive-*
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Merge checksums
        run: |
          cat artifacts/checksums-*.txt | sort > "artifacts/checksums-${{ env.VERSION }}.txt"
          rm -f artifacts/checksums-x86_64-*.txt artifacts/checksums-aarch64-*.txt artifacts/checksums-i686-*.txt
          echo "--- checksums-${{ env.VERSION }}.txt ---"
          cat "artifacts/checksums-${{ env.VERSION }}.txt"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: Salata v${{ env.VERSION }}
          prerelease: true
          generate_release_notes: false
          body: |
            ## Salata v${{ env.VERSION }}

            Polyglot text templating engine with embedded runtime blocks.

            > **Pre-release** — this is a concept project under active development.

            ### What's in each archive

            Each archive contains all 4 Salata binaries for that platform, plus `config.toml` and `README.md`:

            | Binary | Description |
            |--------|-------------|
            | `salata` | Core interpreter — `.slt` file in, text out |
            | `salata-cgi` | CGI bridge for nginx/Apache |
            | `salata-fastcgi` | FastCGI daemon (stub — not yet implemented) |
            | `salata-server` | Standalone dev server with hot reload |

            ### Platforms

            | Platform | Target | Format |
            |----------|--------|--------|
            | Linux x86_64 | `x86_64-unknown-linux-gnu` | `.tar.gz` |
            | Linux ARM64 | `aarch64-unknown-linux-gnu` | `.tar.gz` |
            | Linux i686 | `i686-unknown-linux-gnu` | `.tar.gz` |
            | macOS x86_64 | `x86_64-apple-darwin` | `.tar.gz` |
            | macOS ARM64 | `aarch64-apple-darwin` | `.tar.gz` |
            | Windows x86_64 | `x86_64-pc-windows-msvc` | `.zip` |
            | Windows i686 | `i686-pc-windows-msvc` | `.zip` |
            | Windows ARM64 | `aarch64-pc-windows-msvc` | `.zip` |

            ### Verify checksums

            ```bash
            sha256sum -c checksums-${{ env.VERSION }}.txt
            ```

            ### Quick start

            ```bash
            tar xzf salata-${{ env.VERSION }}-x86_64-unknown-linux-gnu.tar.gz
            ./salata your-file.slt
            ```

            See the [README](https://github.com/nicholasgasior/salata#readme) for full documentation.
          files: artifacts/*
