[salata]
display_errors = true
default_content_type = "text/html; charset=utf-8"
encoding = "utf-8"

[logging]
directory = "./logs"

[runtimes.python]
enabled = true
path = "/usr/bin/python3"
shared_scope = true

[runtimes.ruby]
enabled = true
path = "/usr/bin/ruby"
shared_scope = true

[runtimes.javascript]
enabled = true
path = "/usr/bin/node"
shared_scope = true

[runtimes.typescript]
enabled = true
path = "/usr/local/bin/tsx"
shared_scope = true

[runtimes.php]
enabled = true
mode = "cgi"
cli_path = "/usr/bin/php"
cgi_path = "/usr/bin/php-cgi"
shared_scope = true

[runtimes.shell]
enabled = true
path = "/bin/bash"
shared_scope = true
